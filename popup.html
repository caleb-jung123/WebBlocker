<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Popup</title>
    <link rel="stylesheet" href="/stylesheet.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&icon_names=add" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&icon_names=remove" />
</head>
<body>

    <div class="header">
        <h1 id="header1.1">WORK TIMER</h1>
        <img src="images/Work Timer.png" class="headerImg">
    </div>

    <div class="clock" id="clock">

        <div class="timer" id="timer">

            <div class="timeColumn">
                <div class="timeValues" data-value="hours">00</div>
                <div class="time-adjust">
                    <button id="plusHour">
                        <span class="material-symbols-outlined">
                            add
                        </span>
                    </button>
                    <button id="minusHour">
                        <span class="material-symbols-outlined">
                            remove
                        </span>
                    </button>
                </div>
            </div>

            <div class="separator"> : </div>

            <div class="timeColumn">
                <div class="timeValues" data-value="minutes">30</div>
                <div class="time-adjust">
                    <button id="plusMin">
                        <span class="material-symbols-outlined">
                            add
                        </span>
                    </button>
                    <button id="minusMin">
                        <span class="material-symbols-outlined">
                            remove
                        </span>
                    </button>
                </div>
            </div>

            <div class="separator"> : </div>

            <div class="timeColumn">
                <div class="timeValues" data-value="seconds">00</div>
                <div class="time-adjust">
                    <button id="plusSec" >
                        <span class="material-symbols-outlined">
                            add
                        </span>
                    </button>
                    <button id="minusSec">
                        <span class="material-symbols-outlined">
                            remove
                        </span>
                    </button>
                </div>
            </div>

        </div>

        <div class="control-buttons" id="control-buttons">
            <button id="start">Start</button>
            <button id="stop">Stop</button>
            <button id="reset">Reset</button>
        </div>

    </div>

    <script src="/popup.js"></script>
</body>
</html>
